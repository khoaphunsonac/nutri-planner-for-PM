services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: nutriplanner-app
        restart: unless-stopped
        ports:
            - '${APP_PORT:-8080}:80'
        environment:
            APP_NAME: '${APP_NAME:-NutriPlanner}'
            APP_ENV: '${APP_ENV:-local}'
            APP_KEY: '${APP_KEY:-}'
            APP_DEBUG: '${APP_DEBUG:-true}'
            APP_URL: '${APP_URL:-http://localhost:8080}'
            DB_CONNECTION: '${DB_CONNECTION:-pgsql}'
            DATABASE_URL: '${DATABASE_URL:-}'
            DATABASE_URL_UNPOOLED: '${DATABASE_URL_UNPOOLED:-}'
            DB_HOST: '${DB_HOST:-}'
            DB_PORT: '${DB_PORT:-5432}'
            DB_DATABASE: '${DB_DATABASE:-neondb}'
            DB_USERNAME: '${DB_USERNAME:-neondb_owner}'
            DB_PASSWORD: '${DB_PASSWORD:-}'
            DB_SSLMODE: '${DB_SSLMODE:-require}'
            LOG_CHANNEL: stack
            CACHE_DRIVER: file
            SESSION_DRIVER: file
            QUEUE_CONNECTION: sync
            MAIL_MAILER: '${MAIL_MAILER:-smtp}'
            MAIL_HOST: '${MAIL_HOST:-smtp.gmail.com}'
            MAIL_PORT: '${MAIL_PORT:-587}'
            MAIL_USERNAME: '${MAIL_USERNAME:-}'
            MAIL_PASSWORD: '${MAIL_PASSWORD:-}'
            MAIL_ENCRYPTION: '${MAIL_ENCRYPTION:-tls}'
            MAIL_FROM_ADDRESS: '${MAIL_FROM_ADDRESS:-}'
            MAIL_FROM_NAME: '${APP_NAME:-NutriPlanner}'
            JWT_SECRET: '${JWT_SECRET:-}'
        volumes:
            - app-storage:/var/www/html/storage/app/public
        networks:
            - nutriplanner

networks:
    nutriplanner:
        driver: bridge

volumes:
    app-storage:
        driver: local
