services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: nutriplanner-app
        restart: unless-stopped
        ports:
            - '${APP_PORT:-8080}:80'
        environment:
            APP_NAME: '${APP_NAME:-NutriPlanner}'
            APP_ENV: '${APP_ENV:-local}'
            APP_KEY: '${APP_KEY:-}'
            APP_DEBUG: '${APP_DEBUG:-true}'
            APP_URL: '${APP_URL:-http://localhost:8080}'
            DB_CONNECTION: mysql
            DB_HOST: mysql
            DB_PORT: 3306
            DB_DATABASE: '${DB_DATABASE:-nutriplanner}'
            DB_USERNAME: '${DB_USERNAME:-nutriplanner}'
            DB_PASSWORD: '${DB_PASSWORD:-secret}'
            LOG_CHANNEL: stack
            CACHE_DRIVER: file
            SESSION_DRIVER: file
            QUEUE_CONNECTION: sync
            MAIL_MAILER: '${MAIL_MAILER:-smtp}'
            MAIL_HOST: '${MAIL_HOST:-smtp.gmail.com}'
            MAIL_PORT: '${MAIL_PORT:-587}'
            MAIL_USERNAME: '${MAIL_USERNAME:-}'
            MAIL_PASSWORD: '${MAIL_PASSWORD:-}'
            MAIL_ENCRYPTION: '${MAIL_ENCRYPTION:-tls}'
            MAIL_FROM_ADDRESS: '${MAIL_FROM_ADDRESS:-}'
            MAIL_FROM_NAME: '${APP_NAME:-NutriPlanner}'
            JWT_SECRET: '${JWT_SECRET:-}'
        volumes:
            - app-storage:/var/www/html/storage/app/public
        networks:
            - nutriplanner
        depends_on:
            mysql:
                condition: service_healthy

    mysql:
        image: 'mysql:8.4'
        container_name: nutriplanner-mysql
        restart: unless-stopped
        ports:
            - '${FORWARD_DB_PORT:-3307}:3306'
        environment:
            MYSQL_ROOT_PASSWORD: '${DB_PASSWORD:-secret}'
            MYSQL_DATABASE: '${DB_DATABASE:-nutriplanner}'
            MYSQL_USER: '${DB_USERNAME:-nutriplanner}'
            MYSQL_PASSWORD: '${DB_PASSWORD:-secret}'
        volumes:
            - mysql-data:/var/lib/mysql
        networks:
            - nutriplanner
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${DB_PASSWORD:-secret}"]
            interval: 5s
            retries: 10
            timeout: 5s

networks:
    nutriplanner:
        driver: bridge

volumes:
    mysql-data:
        driver: local
    app-storage:
        driver: local
